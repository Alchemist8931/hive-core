<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE</title>
<meta name="theme-color" content="#0D0D0D">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SN+Pro:wght@200..900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0D0D0D;--bg2:#161616;--bg3:#1A1A1A;--fg:#E5E5E5;--fg2:#A3A3A3;--fg3:#737373;--muted:#525252;--border:#262626;--border2:#1F1F1F;--card:#1A1A1A;--ok:#22C55E;--err:#EF4444;--warn:#F59E0B;--accent:#F0C040}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SN Pro',system-ui,sans-serif;background:var(--bg);color:var(--fg);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Layout */
.app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:1fr 380px;height:100vh}
.header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--border);background:var(--bg);z-index:10}
.viz-area{position:relative;overflow:hidden;display:flex;flex-direction:column}
.chat-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2)}

/* Header */
.logo{font-size:16px;font-weight:700;letter-spacing:.12em;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo span{font-size:20px}
.header-stats{display:flex;gap:16px;font-size:11px;color:var(--fg3)}
.header-stats .s-val{color:var(--fg2);font-weight:600}
.header-right{display:flex;align-items:center;gap:12px}

/* Task Bars */
.task-bars{display:flex;gap:12px;padding:12px 20px;background:rgba(22,22,22,.6);border-bottom:1px solid var(--border2)}
.task-bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.task-bar-label{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--fg3)}
.task-bar-track{width:100%;height:32px;background:var(--bg);border-radius:4px;position:relative;overflow:hidden;border:1px solid var(--border2)}
.task-bar-fill{position:absolute;bottom:0;width:100%;border-radius:3px;transition:height 1.5s cubic-bezier(.16,1,.3,1)}
.task-bar-count{font-size:12px;font-weight:600;color:var(--fg2)}

/* Visualization Canvas */
.canvas-wrap{flex:1;position:relative}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#canvas-bg{z-index:1}
#canvas-particles{z-index:2}
#canvas-agents{z-index:3}

/* Agent Labels */
.agent-labels{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4}
.agent-label{position:absolute;font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--fg3);transform:translateX(-50%);text-align:center;pointer-events:auto;cursor:default}
.agent-label .a-name{font-weight:600;color:var(--fg2);margin-bottom:2px;font-size:10px}
.agent-label .a-score{color:var(--ok);font-size:10px;font-weight:700}
.agent-label .a-status{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px}
.agent-label .a-status.on{background:var(--ok);box-shadow:0 0 6px var(--ok)}
.agent-label .a-status.off{background:var(--muted)}

/* Chat */
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-header h3{font-size:13px;font-weight:600}
.chat-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.chat-tab{flex:1;padding:8px;font-size:10px;text-align:center;color:var(--fg3);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.08em;transition:all .3s}
.chat-tab.active{color:var(--fg);border-color:var(--accent)}
.chat-tab:hover{color:var(--fg2)}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.chat-input-wrap{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--fg);font-size:12px;font-family:inherit;resize:none;max-height:120px;overflow-y:auto;outline:none;transition:border-color .3s}
.chat-input:focus{border-color:rgba(229,229,229,.2)}
.chat-input::placeholder{color:var(--fg3)}
.chat-send{width:36px;height:36px;border-radius:8px;background:var(--fg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.chat-send:hover{transform:scale(1.05);box-shadow:0 4px 12px rgba(229,229,229,.15)}
.chat-send:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none}
.chat-send svg{width:16px;height:16px;color:var(--bg)}

/* Messages */
.msg{max-width:90%;animation:msgIn .3s ease}
.msg-self{align-self:flex-end}.msg-other{align-self:flex-start}
.msg-bubble{padding:8px 12px;border-radius:10px;font-size:12px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-self .msg-bubble{background:rgba(229,229,229,.08);border:1px solid rgba(229,229,229,.1);color:var(--fg2)}
.msg-other .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--fg)}
.msg-meta{font-size:9px;color:var(--fg3);margin-top:3px;display:flex;align-items:center;gap:4px}
.msg-self .msg-meta{justify-content:flex-end}
.msg-typing{align-self:flex-start;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;gap:4px;align-items:center}
.msg-typing span{width:5px;height:5px;border-radius:50%;background:var(--fg3);animation:typeDot 1.4s ease-in-out infinite}
.msg-typing span:nth-child(2){animation-delay:.2s}
.msg-typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Task Panel */
.task-panel{display:none;flex:1;overflow-y:auto;padding:12px 16px}
.task-panel.active{display:block}
.task-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.task-title{font-size:11px;font-weight:600;color:var(--fg);margin-bottom:4px}
.task-info{font-size:10px;color:var(--fg3);display:flex;justify-content:space-between;align-items:center}
.task-status{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.task-status.done{background:rgba(34,197,94,.12);color:#22C55E}
.task-status.in_progress{background:rgba(240,192,64,.12);color:#F0C040}
.task-status.assigned{background:rgba(64,160,240,.12);color:#40A0F0}
.task-status.pending{background:rgba(96,96,128,.12);color:#606080}
.task-status.failed{background:rgba(240,64,96,.12);color:#F04060}
.task-status.escalated{background:rgba(240,96,64,.12);color:#F06040}
.task-status.review{background:rgba(192,96,240,.12);color:#C060F0}
.task-attempt{margin-top:6px;padding:6px 8px;background:var(--bg2);border-radius:4px;font-size:10px;color:var(--fg3)}
.task-attempt .score{font-weight:700}
.task-attempt .score.good{color:var(--ok)}.task-attempt .score.bad{color:var(--err)}

/* Mutations Panel */
.mut-item{padding:8px 0;border-bottom:1px solid var(--border2);font-size:11px}
.mut-item:last-child{border:none}
.mut-who{color:var(--fg2);font-weight:600}
.mut-reason{color:var(--fg3);font-size:10px;margin-top:2px}
.mut-time{color:var(--muted);font-size:9px;margin-top:2px}

/* Corner marks */
.corner-mark{position:absolute;width:16px;height:16px;border-color:rgba(229,229,229,.08);border-style:solid}
.cm-tl{top:0;left:0;border-width:1px 0 0 1px}.cm-tr{top:0;right:0;border-width:1px 1px 0 0}
.cm-bl{bottom:0;left:0;border-width:0 0 1px 1px}.cm-br{bottom:0;right:0;border-width:0 1px 1px 0}

/* Toast */
.toast-box{position:fixed;bottom:16px;right:16px;z-index:100;display:flex;flex-direction:column;gap:8px}
.toast{padding:8px 14px;border-radius:8px;font-size:11px;animation:msgIn .3s ease;border:1px solid var(--border)}
.toast.ok{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.2);color:#22C55E}
.toast.err{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#EF4444}
.toast.info{background:var(--card);color:var(--fg2)}

/* Loading */
.loader{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--fg);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Blueprint grid bg */
.blueprint{background-image:linear-gradient(rgba(229,229,229,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(229,229,229,.015) 1px,transparent 1px);background-size:50px 50px}
</style>
</head>
<body>
<!-- ══════════ APP ══════════ -->
<div id="app" class="app">
  <!-- Header -->
  <header class="header">
    <div class="logo"><span>🐝</span> HIVE</div>
    <div class="header-stats" id="hdr-stats">
      <span><span class="s-val" id="h-agents">0</span> agents</span>
      <span><span class="s-val" id="h-tasks">0</span> tasks</span>
      <span>$<span class="s-val" id="h-cost">0.00</span></span>
    </div>
    <div class="header-right">
      <div style="font-size:10px;color:var(--fg3)" id="h-model">sonnet 4.6</div>
    </div>
  </header>

  <!-- Visualization Area -->
  <div class="viz-area blueprint">
    <!-- Task bars -->
    <div class="task-bars" id="task-bars">
      <div class="task-bar-item"><div class="task-bar-count" id="tb-pending">0</div><div class="task-bar-track"><div class="task-bar-fill" id="tbf-pending" style="height:0;background:var(--muted)"></div></div><div class="task-bar-label">в очереди</div></div>
      <div class="task-bar-item"><div class="task-bar-count" id="tb-active">0</div><div class="task-bar-track"><div class="task-bar-fill" id="tbf-active" style="height:0;background:var(--accent)"></div></div><div class="task-bar-label">в работе</div></div>
      <div class="task-bar-item"><div class="task-bar-count" id="tb-review">0</div><div class="task-bar-track"><div class="task-bar-fill" id="tbf-review" style="height:0;background:#C060F0"></div></div><div class="task-bar-label">проверка</div></div>
      <div class="task-bar-item"><div class="task-bar-count" id="tb-done">0</div><div class="task-bar-track"><div class="task-bar-fill" id="tbf-done" style="height:0;background:var(--ok)"></div></div><div class="task-bar-label">выполнено</div></div>
    </div>
    <!-- Canvas layers -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="canvas-bg"></canvas>
      <canvas id="canvas-particles"></canvas>
      <canvas id="canvas-agents"></canvas>
      <div class="agent-labels" id="agent-labels"></div>
      <div class="corner-mark cm-tl"></div><div class="corner-mark cm-tr"></div>
      <div class="corner-mark cm-bl"></div><div class="corner-mark cm-br"></div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <h3>🐝 Секретарь</h3>
      <div style="font-size:9px;color:var(--ok);display:flex;align-items:center;gap:4px">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 6px var(--ok)"></span>online
      </div>
    </div>
    <div class="chat-tabs">
      <div class="chat-tab active" data-tab="chat">Чат</div>
      <div class="chat-tab" data-tab="tasks">Задачи</div>
      <div class="chat-tab" data-tab="log">Лог</div>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="msg msg-other"><div class="msg-bubble">Я Секретарь системы Hive. Могу создавать агентов, назначать задачи и управлять рабочим процессом. Что нужно сделать?</div><div class="msg-meta">Secretary · just now</div></div>
    </div>
    <div class="task-panel" id="tasks-panel"></div>
    <div class="task-panel" id="log-panel"></div>
    <div class="chat-input-wrap" id="chat-input-wrap">
      <textarea class="chat-input" id="chat-input" placeholder="Сообщение секретарю..." rows="1"></textarea>
      <button class="chat-send" id="chat-send"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg></button>
    </div>
  </div>
</div>

<div class="toast-box" id="toasts"></div>

<script type="module">
// ══════════════════════════════════════════════════
// CONFIG — Replace with your values
// ══════════════════════════════════════════════════
const SUPABASE_URL = 'https://ircaixnzpwadjnisdxbg.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyY2FpeG56cHdhZGpuaXNkeGJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMDc1ODEsImV4cCI6MjA5MTY4MzU4MX0.5a1iViru8r1DVPSX3UDVx_hILFNghXZOXuo_A1oNoFg';

import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0/+esm';
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
const S = {
  agents: [], tasks: [], attempts: [], mutations: [],
  chatHistory: [],
  secretaryBusy: false,
  activeAgentIds: new Set(), // agents currently executing
};

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };
function toast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  $('toasts').appendChild(t);
  setTimeout(() => { t.style.opacity = 0; setTimeout(() => t.remove(), 300); }, 3500);
}
function timeAgo(d) {
  const m = Math.floor((Date.now() - new Date(d).getTime()) / 60000);
  if (m < 1) return 'сейчас';
  if (m < 60) return `${m}м`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}ч`;
  return `${Math.floor(h / 24)}д`;
}

// ══════════════════════════════════════════════════
// DATA FETCHING
// ══════════════════════════════════════════════════
async function fetchAll() {
  const [ag, tk, at, mu] = await Promise.all([
    db.from('agent_summary').select('*'),
    db.from('tasks').select('*').order('created_at', { ascending: false }).limit(50),
    db.from('task_attempts').select('*').order('created_at', { ascending: false }).limit(100),
    db.from('agent_mutations').select('*').order('created_at', { ascending: false }).limit(30),
  ]);
  S.agents = ag.data || [];
  S.tasks = tk.data || [];
  S.attempts = at.data || [];
  S.mutations = mu.data || [];

  // Determine active agents
  S.activeAgentIds.clear();
  S.tasks.filter(t => ['in_progress', 'assigned', 'review'].includes(t.status)).forEach(t => {
    if (t.assigned_to) S.activeAgentIds.add(t.assigned_to);
  });

  updateHeader();
  updateTaskBars();
  updateAgentLabels();
  renderTasksPanel();
  renderMutationsPanel();
}

// ══════════════════════════════════════════════════
// REALTIME
// ══════════════════════════════════════════════════
function setupRealtime() {
  db.channel('hive-live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'agents' }, () => fetchAll())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, () => fetchAll())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'task_attempts' }, () => fetchAll())
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agent_mutations' }, () => fetchAll())
    .subscribe();
}

// ══════════════════════════════════════════════════
// HEADER & TASK BARS
// ══════════════════════════════════════════════════
function updateHeader() {
  $('h-agents').textContent = S.agents.length;
  $('h-tasks').textContent = S.tasks.length;
  const cost = S.agents.reduce((s, a) => s + (a.total_cost_usd || 0), 0);
  $('h-cost').textContent = cost.toFixed(4);
}

function updateTaskBars() {
  const counts = { pending: 0, active: 0, review: 0, done: 0 };
  S.tasks.forEach(t => {
    if (t.status === 'pending') counts.pending++;
    else if (['assigned', 'in_progress'].includes(t.status)) counts.active++;
    else if (t.status === 'review') counts.review++;
    else if (t.status === 'done') counts.done++;
  });
  const max = Math.max(counts.pending, counts.active, counts.review, counts.done, 1);
  ['pending', 'active', 'review', 'done'].forEach(k => {
    $(`tb-${k}`).textContent = counts[k];
    $(`tbf-${k}`).style.height = `${(counts[k] / max) * 100}%`;
  });
}

// ══════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════
const chatEl = $('chat-messages');
const inputEl = $('chat-input');
const sendBtn = $('chat-send');

function addMsg(text, isSelf, meta = '') {
  const div = document.createElement('div');
  div.className = `msg ${isSelf ? 'msg-self' : 'msg-other'}`;
  div.innerHTML = `<div class="msg-bubble">${esc(text)}</div><div class="msg-meta">${meta}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg-typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() { $('typing-indicator')?.remove(); }

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || S.secretaryBusy) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMsg(text, true, 'вы · ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}));

  S.secretaryBusy = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/secretary-action`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ message: text })
    });
    hideTyping();

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (data.error) {
      addMsg('Ошибка: ' + data.error, false, 'secretary · error');
      toast(data.error, 'err');
    } else {
      addMsg(data.response || 'Готово.', false, 'secretary · ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'}));
      if (data.tool_calls?.length) {
        const tools = data.tool_calls.map(tc => `▸ ${tc.tool}`).join('\n');
        addMsg(tools, false, 'tools used');
      }
    }
    // Refresh data after secretary action
    setTimeout(() => fetchAll(), 1000);
    setTimeout(() => fetchAll(), 5000);
  } catch (e) {
    hideTyping();
    addMsg('Ошибка связи: ' + e.message, false, 'error');
    toast('Ошибка связи', 'err');
  }
  S.secretaryBusy = false;
  sendBtn.disabled = false;
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
inputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });

// ══════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════
document.querySelectorAll('.chat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const name = tab.dataset.tab;
    chatEl.style.display = name === 'chat' ? 'flex' : 'none';
    $('chat-input-wrap').style.display = name === 'chat' ? 'flex' : 'none';
    $('tasks-panel').classList.toggle('active', name === 'tasks');
    $('log-panel').classList.toggle('active', name === 'log');
  });
});

function renderTasksPanel() {
  const panel = $('tasks-panel');
  if (!S.tasks.length) { panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg3);font-size:11px">Нет задач</div>'; return; }
  panel.innerHTML = S.tasks.slice(0, 30).map(t => {
    const agent = S.agents.find(a => a.id === t.assigned_to);
    const attempts = S.attempts.filter(a => a.task_id === t.id);
    return `<div class="task-card">
      <div class="task-title">${esc(t.title)}</div>
      <div class="task-info"><span>→ ${agent?.name || '—'} · ${t.current_attempt}/${t.max_attempts}</span><span class="task-status ${t.status}">${t.status}</span></div>
      ${t.final_score != null ? `<div style="font-size:10px;color:var(--fg3);margin-top:4px">Score: <b style="color:${t.final_score >= 0.7 ? 'var(--ok)' : 'var(--err)'}">${t.final_score.toFixed(2)}</b></div>` : ''}
      ${attempts.map(a => `<div class="task-attempt">Попытка ${a.attempt_num}: <span class="score ${(a.score||0)>=0.7?'good':'bad'}">${a.score != null ? a.score.toFixed(2) : '—'}</span>${a.feedback ? ' — ' + esc(a.feedback.substring(0,100)) : ''}</div>`).join('')}
    </div>`;
  }).join('');
}

function renderMutationsPanel() {
  const panel = $('log-panel');
  if (!S.mutations.length) { panel.innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg3);font-size:11px">Нет изменений</div>'; return; }
  const labels = { create:'создал', update_prompt:'обновил промпт', update_tools:'обновил инструменты', update_model:'сменил модель', update_status:'сменил статус', archive:'архивировал', update_config:'настроил' };
  panel.innerHTML = S.mutations.map(m => {
    const who = S.agents.find(a => a.id === m.mutated_by)?.name || '?';
    const target = S.agents.find(a => a.id === m.agent_id)?.name || '?';
    return `<div class="mut-item"><span class="mut-who">${esc(who)}</span> ${labels[m.mutation_type]||m.mutation_type} <span class="mut-who">${esc(target)}</span>${m.reason ? `<div class="mut-reason">${esc(m.reason)}</div>` : ''}<div class="mut-time">${timeAgo(m.created_at)}</div></div>`;
  }).join('');
}

// ══════════════════════════════════════════════════
// CANVAS — Secretary Tentacles
// ══════════════════════════════════════════════════
const bgCanvas = $('canvas-bg');
const bgCtx = bgCanvas.getContext('2d');
let tentacles = [];
let secX, secY;

class Tentacle {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.endAngle = Math.random() * 360;
    this.endSpeed = (Math.random() * 8 + 1) / 50;
    this.endDir = Math.random() < .5 ? -1 : 1;
    this.endFreq = Math.random() * 200 + 50;
    this.c1Angle = Math.random() * 360;
    this.c1Speed = (Math.random() * 8 + 1) / 20;
    this.c1Dir = Math.random() < .5 ? -1 : 1;
    this.c1Freq = Math.random() * 200 + 50;
    this.c2Angle = Math.random() * 360;
    this.c2Speed = (Math.random() * 8 + 1) / 20;
    this.c2Dir = Math.random() < .5 ? -1 : 1;
    this.c2Freq = Math.random() * 200 + 50;
    this.radius = 60 + Math.random() * 40;
  }
  update() {
    if (--this.endFreq <= 0) { this.endDir *= -1; this.endFreq = Math.random() * 200 + 50; }
    if (--this.c1Freq <= 0) { this.c1Dir *= -1; this.c1Freq = Math.random() * 200 + 50; }
    if (--this.c2Freq <= 0) { this.c2Dir *= -1; this.c2Freq = Math.random() * 200 + 50; }
    this.endAngle += this.endDir * this.endSpeed;
    this.c1Angle += this.c1Dir * this.c1Speed;
    this.c2Angle += this.c2Dir * this.c2Speed;
  }
  draw(ctx, busy) {
    const rad = a => a * Math.PI / 180;
    const c1x = this.x + Math.cos(rad(this.c1Angle)) * (this.radius * .6);
    const c1y = this.y + Math.sin(rad(this.c1Angle)) * (this.radius * .6);
    const ex = this.x + Math.cos(rad(this.endAngle)) * this.radius;
    const ey = this.y + Math.sin(rad(this.endAngle)) * this.radius;
    const c2x = ex + Math.cos(rad(this.c2Angle)) * (this.radius * .5);
    const c2y = ey + Math.sin(rad(this.c2Angle)) * (this.radius * .5);
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
    ctx.strokeStyle = busy ? 'rgba(240,192,64,.12)' : 'rgba(229,229,229,.06)';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

// ══════════════════════════════════════════════════
// CANVAS — Agent Dot Grids
// ══════════════════════════════════════════════════
const agCanvas = $('canvas-agents');
const agCtx = agCanvas.getContext('2d');

class AgentViz {
  constructor(id, name) {
    this.id = id;
    this.name = name;
    this.x = 0; this.y = 0;
    this.gridW = 12; this.gridH = 12;
    this.dotSize = 4; this.gap = 1;
    this.dots = [];
    this.initDots();
  }
  initDots() {
    this.dots = [];
    for (let gx = 0; gx < this.gridW; gx++) {
      for (let gy = 0; gy < this.gridH; gy++) {
        this.dots.push({
          ox: gx * (this.dotSize + this.gap),
          oy: gy * (this.dotSize + this.gap),
          layer: Math.random() < 0.01 ? 1 : (Math.random() < 0.004 ? 2 : 0),
          animating: false, vx: 0, vy: 0, tx: 0, ty: 0, dx: 0, dy: 0
        });
      }
    }
  }
  get totalW() { return this.gridW * (this.dotSize + this.gap); }
  get totalH() { return this.gridH * (this.dotSize + this.gap); }
  update(active) {
    this.dots.forEach(d => {
      // Light dots only when active
      if (d.layer === 2 && !active) return;
      if (d.layer === 2 && !d.animating && Math.random() < 0.008) {
        d.animating = true;
        const dir = Math.floor(Math.random() * 4);
        const dist = (this.dotSize + this.gap) * (Math.floor(Math.random() * 2) + 1);
        d.tx = d.dx; d.ty = d.dy;
        if (dir === 0 && d.oy + d.dy - dist >= 0) d.ty -= dist;
        else if (dir === 1 && d.oy + d.dy + dist < this.totalH) d.ty += dist;
        else if (dir === 2 && d.ox + d.dx - dist >= 0) d.tx -= dist;
        else if (dir === 3 && d.ox + d.dx + dist < this.totalW) d.tx += dist;
        d.vx = (d.tx - d.dx) * 0.07;
        d.vy = (d.ty - d.dy) * 0.07;
        if (d.tx === d.dx && d.ty === d.dy) d.animating = false;
      }
      if (d.animating) {
        d.dx += Math.abs(d.tx - d.dx) > Math.abs(d.vx) ? d.vx : (d.tx - d.dx);
        d.dy += Math.abs(d.ty - d.dy) > Math.abs(d.vy) ? d.vy : (d.ty - d.dy);
        if (Math.abs(d.dx - d.tx) < 0.5 && Math.abs(d.dy - d.ty) < 0.5) { d.dx = d.tx; d.dy = d.ty; d.animating = false; }
      }
    });
  }
  draw(ctx, active) {
    ctx.save();
    ctx.translate(this.x, this.y);
    this.dots.forEach(d => {
      const px = d.ox + d.dx;
      const py = d.oy + d.dy;
      let color;
      if (d.layer === 1) color = '#41413E';
      else if (d.layer === 2 && active) color = '#F4F3F0';
      else if (d.layer === 2 && !active) color = 'transparent';
      else color = 'transparent';
      if (color === 'transparent') return;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(px, py, this.dotSize, this.dotSize, 1.5);
      ctx.fill();
    });
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════
// CANVAS — Particle Flows
// ══════════════════════════════════════════════════
const ptCanvas = $('canvas-particles');
const ptCtx = ptCanvas.getContext('2d');
let particles = [];

class FlowParticle {
  constructor(sx, sy, ex, ey) {
    this.sx = sx; this.sy = sy; this.ex = ex; this.ey = ey;
    this.t = 0;
    this.speed = 0.005 + Math.random() * 0.01;
    this.size = 1 + Math.random() * 1.5;
    this.offset = (Math.random() - .5) * 8; // narrow stream
    this.alpha = .4 + Math.random() * .4;
    this.color = Math.random() < .3 ? '#F4F3F0' : '#B0B0B0';
  }
  update() {
    this.t += this.speed;
    return this.t < 1;
  }
  draw(ctx) {
    const x = this.sx + (this.ex - this.sx) * this.t + this.offset * Math.sin(this.t * Math.PI);
    const y = this.sy + (this.ey - this.sy) * this.t + this.offset * Math.cos(this.t * Math.PI);
    const a = this.alpha * (this.t < .1 ? this.t / .1 : this.t > .8 ? (1 - this.t) / .2 : 1);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(x, y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ══════════════════════════════════════════════════
// VISUALIZATION ENGINE
// ══════════════════════════════════════════════════
let agentVizzes = [];
let frame = 0;

function resizeCanvases() {
  const wrap = $('canvas-wrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  [bgCanvas, ptCanvas, agCanvas].forEach(c => { c.width = w; c.height = h; });

  // Secretary position
  secX = w / 2;
  secY = h / 2;

  // Reset tentacles
  tentacles = [];
  for (let i = 0; i < 80; i++) tentacles.push(new Tentacle(secX, secY));

  // Position agents in circle around secretary
  layoutAgents(w, h);
}

function layoutAgents(w, h) {
  const count = agentVizzes.length;
  if (!count) return;
  const radius = Math.min(w, h) * 0.35;
  agentVizzes.forEach((av, i) => {
    const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
    av.x = secX + Math.cos(angle) * radius - av.totalW / 2;
    av.y = secY + Math.sin(angle) * radius - av.totalH / 2;
  });
}

function updateAgentLabels() {
  const labelsEl = $('agent-labels');
  labelsEl.innerHTML = '';

  // Sync vizzes with data
  const currentIds = new Set(agentVizzes.map(v => v.id));
  S.agents.forEach(a => {
    if (!currentIds.has(a.id)) {
      agentVizzes.push(new AgentViz(a.id, a.name));
    }
  });
  agentVizzes = agentVizzes.filter(v => S.agents.some(a => a.id === v.id));

  const wrap = $('canvas-wrap');
  layoutAgents(wrap.clientWidth, wrap.clientHeight);

  // Secretary label
  const secLabel = document.createElement('div');
  secLabel.className = 'agent-label';
  secLabel.style.left = secX + 'px';
  secLabel.style.top = (secY + 85) + 'px';
  secLabel.innerHTML = `<div class="a-name" style="color:var(--accent)">SECRETARY</div><div style="color:var(--fg3);font-size:9px">orchestrator</div>`;
  labelsEl.appendChild(secLabel);

  // Agent labels
  agentVizzes.forEach(av => {
    const a = S.agents.find(x => x.id === av.id);
    if (!a) return;
    const isActive = S.activeAgentIds.has(a.id);
    const label = document.createElement('div');
    label.className = 'agent-label';
    label.style.left = (av.x + av.totalW / 2) + 'px';
    label.style.top = (av.y + av.totalH + 8) + 'px';
    label.innerHTML = `<div class="a-name"><span class="a-status ${isActive?'on':'off'}"></span>${esc(a.name)}</div>
      ${a.avg_score != null ? `<div class="a-score">${a.avg_score}</div>` : ''}
      <div style="color:var(--fg3)">${a.tasks_done||0} done · $${(a.total_cost_usd||0).toFixed(3)}</div>`;
    labelsEl.appendChild(label);
  });
}

function animate() {
  frame++;
  const w = bgCanvas.width, h = bgCanvas.height;

  // Background — Secretary tentacles
  bgCtx.clearRect(0, 0, w, h);
  bgCtx.shadowColor = S.secretaryBusy ? 'rgba(240,192,64,.3)' : 'rgba(229,229,229,.15)';
  bgCtx.shadowBlur = 6;
  tentacles.forEach(t => { t.update(); t.draw(bgCtx, S.secretaryBusy); });
  bgCtx.shadowBlur = 0;

  // Agents
  agCtx.clearRect(0, 0, w, h);
  agentVizzes.forEach(av => {
    const isActive = S.activeAgentIds.has(av.id);
    av.update(isActive);
    av.draw(agCtx, isActive);
  });

  // Particles — flows between secretary and active agents
  ptCtx.clearRect(0, 0, w, h);
  agentVizzes.forEach(av => {
    const isActive = S.activeAgentIds.has(av.id);
    if (isActive && frame % 3 === 0) {
      const ax = av.x + av.totalW / 2;
      const ay = av.y + av.totalH / 2;
      // Secretary → Agent
      particles.push(new FlowParticle(secX, secY, ax, ay));
      // Agent → Secretary (return)
      if (Math.random() < .3) particles.push(new FlowParticle(ax, ay, secX, secY));
    }
  });

  // Also emit particles when secretary is busy (even without specific agent)
  if (S.secretaryBusy && frame % 5 === 0) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 80 + Math.random() * 40;
    particles.push(new FlowParticle(secX, secY, secX + Math.cos(angle) * dist, secY + Math.sin(angle) * dist));
  }

  particles = particles.filter(p => {
    const alive = p.update();
    if (alive) p.draw(ptCtx);
    return alive;
  });
  ptCtx.globalAlpha = 1;

  requestAnimationFrame(animate);
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
window.addEventListener('resize', resizeCanvases);
resizeCanvases();
await fetchAll();
setupRealtime();
animate();

// Periodic refresh
setInterval(fetchAll, 15000);
</script>
